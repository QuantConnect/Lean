name: Sync upstream

on:
  schedule:
    - cron: "0 2 * * *" # daily at 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: my-master
          fetch-depth: 0
          persist-credentials: true

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/QuantConnect/Lean.git || true
          # fetch all branches and tags from upstream
          git fetch upstream --prune --tags

      - name: Create/update master as replica of upstream/master
        run: |
          set -euo pipefail

          # Fetch all refs
          git fetch origin --prune
          git fetch upstream --prune

          # Create or update master branch to exactly match upstream/master
          git checkout -B master upstream/master
          git push --force-with-lease origin master

      - name: Check if master is ahead of my-master
        id: check_ahead
        run: |
          git fetch origin my-master:refs/remotes/origin/my-master || true
          # Count commits master is ahead of my-master
          AHEAD=$(git rev-list --left-right --count origin/my-master...origin/master | awk '{print $2}')
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "Commits ahead: $AHEAD"

      - name: Check for existing PR
        id: check_pr
        if: steps.check_ahead.outputs.ahead != '0'
        run: |
          # Check if a PR from master to my-master already exists
          PR_COUNT=$(gh pr list --head master --base my-master --state open --json number --jq 'length')
          echo "pr_exists=$([ $PR_COUNT -gt 0 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          if [ $PR_COUNT -gt 0 ]; then
            PR_NUMBER=$(gh pr list --head master --base my-master --state open --json number -q '.[0].number')
            echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR from master to my-master
        if: steps.check_ahead.outputs.ahead != '0' && steps.check_pr.outputs.pr_exists == 'false'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: my-master
          head: master
          title: "chore: sync from upstream QuantConnect/Lean"
          body: |
            Automated sync from upstream QuantConnect/Lean.
            
            This PR updates `my-master` with the latest changes from upstream's `master` branch.

      - name: Update existing PR
        if: steps.check_ahead.outputs.ahead != '0' && steps.check_pr.outputs.pr_exists == 'true'
        run: |
          echo "PR #${{ steps.check_pr.outputs.pr_number }} already exists with upstream changes"
          echo "The PR will automatically reflect the latest master branch changes"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
